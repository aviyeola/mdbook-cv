name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install system deps for PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz default-jre-headless curl || true

      - name: Install mdbook and plugins
        run: |
          export CARGO_HOME="$HOME/.cargo"
          export PATH="$CARGO_HOME/bin:$PATH"
          cargo install --locked mdbook mdbook-plantuml mdbook-mermaid || true

      - name: Download PlantUML jar
        run: |
          sudo mkdir -p /opt/plantuml
          sudo curl -L -o /opt/plantuml/plantuml.jar https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar || true

      - name: Generate Cargo.lock (if missing)
        run: cargo generate-lockfile

      - name: Build (cargo)
        run: cargo build --verbose

      - name: Run mdbook build (with plugins)
        env:
          PATH: ${{ env.HOME }}/.cargo/bin:/usr/local/bin:/usr/bin:/bin
        run: |
          if ! command -v mdbook >/dev/null 2>&1; then
            echo "mdbook not found in PATH; failing"
            exit 1
          fi
          if [ -d "book" ]; then
            echo "Running mdbook build on ./book"
            mdbook build book
          else
            echo "No book directory present; nothing to build"
            exit 0
          fi

      - name: Validate PlantUML rendering
        run: |
          set -e
          OUTPUT_DIR="book/book"
          echo "Checking build output in $OUTPUT_DIR"
          if [ ! -d "$OUTPUT_DIR" ]; then
            echo "Build output not found at $OUTPUT_DIR"
            ls -la
            exit 1
          fi
          # Look for generated image files (SVG/PNG)
          IMG_COUNT=$(find "$OUTPUT_DIR" -type f \( -iname '*.svg' -o -iname '*.png' \) | wc -l)
          echo "Found $IMG_COUNT image files in $OUTPUT_DIR"
          if [ "$IMG_COUNT" -eq 0 ]; then
            echo "No image files found; PlantUML rendering may have failed"
            find "$OUTPUT_DIR" -maxdepth 2 -type f -ls || true
            exit 1
          fi
          # Check diagrams page references an image
          if grep -E -i '<img[^>]+\.(svg|png)' "$OUTPUT_DIR"/diagrams.html >/dev/null 2>&1; then
            echo "PlantUML image referenced in diagrams.html"
            exit 0
          fi
          if [ -f "$OUTPUT_DIR/diagrams/index.html" ] && grep -E -i '<img[^>]+\.(svg|png)' "$OUTPUT_DIR/diagrams/index.html" >/dev/null 2>&1; then
            echo "PlantUML image referenced in diagrams/index.html"
            exit 0
          fi
          echo "No image reference found in diagrams page; failing"
          exit 1
